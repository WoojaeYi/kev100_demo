<script>
window.currentGnb = 4;
const treeData = [
    { no:1, nm:'계정관리', lvl:1, children:[
        { no:11, nm:'기업계정', lvl:2, url:'/admin/account/accountList.do', children:[
            { no:111, nm:'기업계정 목록', lvl:3, url:'/admin/account/accountList.do' },
            { no:112, nm:'계정 통계', lvl:3, url:'/admin/account/accountStat.do' },
        ]},
        { no:12, nm:'일반회원', lvl:2, url:'/admin/gnrlmber/gnrlmberList.do', children:[] },
        { no:13, nm:'로그인 로그', lvl:2, url:'/admin/loginlog/loginlogList.do', children:[] },
    ]},
    { no:2, nm:'캠페인관리', lvl:1, children:[
        { no:21, nm:'캠페인', lvl:2, children:[
            { no:211, nm:'캠페인 목록', lvl:3, url:'/admin/camp/campList.do' },
        ]},
        { no:22, nm:'캠페인 통계', lvl:2, children:[] },
    ]},
    { no:3, nm:'게시판관리', lvl:1, children:[
        { no:31, nm:'FAQ', lvl:2, children:[] },
        { no:32, nm:'Q&A', lvl:2, children:[] },
        { no:33, nm:'공지/자료', lvl:2, children:[] },
    ]},
    { no:4, nm:'시스템관리', lvl:1, children:[
        { no:41, nm:'메뉴관리', lvl:2, children:[] },
        { no:42, nm:'코드관리', lvl:2, children:[] },
        { no:43, nm:'권한관리', lvl:2, children:[] },
        { no:44, nm:'사이트관리', lvl:2, children:[] },
    ]},
];
function renderTree(items, ul, cls) {
    items.forEach(function(m) {
        const li = document.createElement('li');
        li.className = cls;
        const icon = m.lvl===1?'fa-folder':'fa-file-text-o';
        li.innerHTML = '<div class="menu-item"><span class="mi-indent"></span><i class="fa '+icon+' mi-icon"></i><span class="mi-name">'+m.nm+'</span><span class="mi-badge">No.'+m.no+'</span></div>';
        li.querySelector('.menu-item').onclick = function(e) {
            e.stopPropagation();
            document.querySelectorAll('.menu-item').forEach(function(x){x.classList.remove('selected');});
            this.classList.add('selected');
            document.getElementById('selectedMenuName').textContent = '- '+m.nm;
            document.getElementById('menuDetail').innerHTML = '<table class="detail-table"><tr><th>메뉴번호</th><td>'+m.no+'</td><th>메뉴명</th><td><input type="text" class="form-control" value="'+m.nm+'"></td></tr><tr><th>레벨</th><td>'+m.lvl+'</td><th>URL</th><td><input type="text" class="form-control" value="'+(m.url||'')+'"></td></tr><tr><th>사용여부</th><td><select class="form-control" style="width:120px;"><option>사용</option><option>미사용</option></select></td><th>정렬순서</th><td><input type="number" class="form-control" value="'+m.no+'"></td></tr></table><div class="text-right mt-3"><button class="btn btn-primary"><i class="fa fa-save mr-1"></i>저장</button> <button class="btn btn-danger ml-1"><i class="fa fa-trash mr-1"></i>삭제</button></div>';
        };
        ul.appendChild(li);
        if(m.children && m.children.length) {
            const subUl = document.createElement('ul');
            subUl.className = 'menu-tree';
            renderTree(m.children, subUl, m.lvl===1?'sub-item':'third-item');
            li.appendChild(subUl);
        }
    });
}
renderTree(treeData, document.getElementById('menuTree'), '');
</script>
