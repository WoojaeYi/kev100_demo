<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역할별 권한 목록 | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>.content-area{padding:24px 28px;}.table-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-shield mr-2" style="color:#1f8dab;font-size:17px;"></i>역할별 권한 목록</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>시스템관리</li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">역할별 권한</li></ul></div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group">
          <label>역할 &nbsp;</label>
          <select class="form-control" style="width:200px;" onchange="loadRoleAuthor(this.value)">
            <option value="">∷ 역할을 선택하세요 ∷</option>
            <option value="ROLE_ADMIN" selected>ROLE_ADMIN - 시스템관리자</option>
            <option value="ROLE_OPER">ROLE_OPER - 운영자</option>
            <option value="ROLE_VIEW">ROLE_VIEW - 조회자</option>
          </select>
        </div>
      </div>
      <div class="table-info">
        <div style="font-size:13px;color:#666;">역할: <strong>ROLE_ADMIN (시스템관리자)</strong> 총 <strong>124</strong>개 프로그램 접근 권한</div>
        <button class="btn btn-dark btn-sm" onclick="alert('권한 저장 완료')"><i class="fa fa-save mr-1"></i>저장</button>
      </div>
      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th><input type="checkbox" id="allChk" onchange="toggleAll(this)"></th><th>번호</th><th>프로그램명</th><th>URL</th><th>방식</th></tr></thead>
          <tbody id="roleAuthorBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
const programs = [
  {no:10,nm:'배치 이력 목록',url:'/admin/expthread/expthreadList.do',method:'GET',chk:true},
  {no:9,nm:'메뉴 관리',url:'/admin/menucreate/menucreateManage.do',method:'GET',chk:true},
  {no:8,nm:'프로그램 목록',url:'/admin/program/programList.do',method:'GET',chk:true},
  {no:7,nm:'역할 목록',url:'/admin/role/roleList.do',method:'GET',chk:true},
  {no:6,nm:'분류코드 목록',url:'/admin/clcode/clcodeList.do',method:'GET',chk:true},
  {no:5,nm:'코드 목록',url:'/admin/code/codeList.do',method:'GET',chk:true},
  {no:4,nm:'캠페인 목록',url:'/admin/camp/campList.do',method:'GET',chk:true},
  {no:3,nm:'기업 회원 목록',url:'/admin/account/accountList.do',method:'GET',chk:true},
  {no:2,nm:'사이트 통계',url:'/admin/sitelog/sitelogDateGraph.do',method:'GET',chk:true},
  {no:1,nm:'공지사항 목록',url:'/admin/bbs/bbsList.do',method:'GET',chk:true},
];
const METHOD_COLOR={'GET':'#1f8dab','POST':'#388e3c','DELETE':'#e53935','PUT':'#ff8f00'};
document.getElementById('roleAuthorBody').innerHTML = programs.map(d=>`
  <tr><td><input type="checkbox" ${d.chk?'checked':''}></td><td>${d.no}</td><td class="t-a-left">${d.nm}</td>
  <td class="t-a-left" style="font-size:12px;color:#888;">${d.url}</td>
  <td><span style="background:${METHOD_COLOR[d.method]};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">${d.method}</span></td></tr>`).join('');
function toggleAll(el){document.querySelectorAll('#roleAuthorBody input[type=checkbox]').forEach(c=>c.checked=el.checked);}
</script>
</body></html>
