<script>
window.currentGnb = 3;
const faqs = [
  {no:48, cat:'캠페인 신청', q:'EV100 캠페인 신청 자격 요건이 어떻게 되나요?', open:'공개', views:1205, date:'2026-03-20'},

  {no:46, cat:'심사/승인', q:'캠페인 심사 기간은 얼마나 걸리나요?', open:'공개', views:876, date:'2026-03-15'},
  {no:45, cat:'계정/회원', q:'기업계정 담당자 변경 절차는 어떻게 되나요?', open:'공개', views:754, date:'2026-03-10'},

];
document.getElementById('faqBody').innerHTML = faqs.map(f=>`<tr>
  <td>${f.no}</td>
  <td><span class="ing" style="background:#e8f4f7;color:#0e424f;">${f.cat}</span></td>
  <td class="left"><a href="#" class="faq-q">${f.q}</a></td>
  <td>${f.open==='공개'?'<span class="use">공개</span>':'<span class="notUse">비공개</span>'}</td>
  <td>${f.views.toLocaleString()}</td>
  <td>${f.date}</td>
  <td><button class="btn btn-secondary btn-sm"><i class="fa fa-pencil mr-1"></i>수정</button></td>
</tr>`).join('');
