<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#0e424f;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:400px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo i{font-size:36px;color:#7ecbda;}
.login-logo h1{font-size:22px;font-weight:700;color:#fff;margin-top:10px;letter-spacing:-0.5px;}
.login-logo p{font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px;}
.login-card{background:#fff;border-radius:6px;padding:36px 32px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-card h2{font-size:16px;font-weight:700;color:#0e424f;margin-bottom:24px;text-align:center;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12.5px;font-weight:500;color:#555;margin-bottom:6px;}
.form-group input{width:100%;height:42px;border:1px solid #d0dae0;border-radius:3px;padding:0 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border 0.2s;}
.form-group input:focus{border-color:#1f8dab;}
.btn-login{width:100%;height:44px;background:#0e424f;color:#fff;border:none;border-radius:3px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif;transition:background 0.2s;}
.btn-login:hover{background:#1f8dab;}
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.5);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <i class="fa fa-bolt"></i>
    <h1>K-EV100 관리자</h1>
    <p>전기차 100% 전환 캠페인 행정 포털</p>
  </div>
  <div class="login-card">
    <h2>관리자 로그인</h2>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="userId">아이디</label>
        <input type="text" id="userId" placeholder="아이디를 입력하세요" value="admin">
      </div>
      <div class="form-group">
        <label for="userPw">비밀번호</label>
        <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" value="admin1234">
      </div>
      <button type="submit" class="btn-login"><i class="fa fa-sign-in mr-1"></i>로그인</button>
    </form>
  </div>
  <div class="login-footer">K-EV100 서비스 포털 &copy; 2026</div>
</div>
<script>
function doLogin(e){ e.preventDefault(); window.location.href='../index.html'; }
</script>
</body>
</html>
