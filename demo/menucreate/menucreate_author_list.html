<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 권한 목록 | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>.content-area{padding:24px 28px;}.table-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-shield mr-2" style="color:#1f8dab;font-size:17px;"></i>메뉴 권한 목록</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>시스템관리</li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">메뉴 권한 목록</li></ul></div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group">
          <label>권한 &nbsp;</label>
          <select class="form-control" style="width:180px;"><option value="">∷ 전체 권한 ∷</option><option>시스템관리자</option><option>운영자</option><option>조회자</option></select>
          <input type="text" class="form-control" style="width:180px;" placeholder="메뉴명 검색">
          <button class="btn btn-dark"><i class="fa fa-search mr-1"></i>검색</button>
        </div>
      </div>
      <div class="table-info"><div style="font-size:13px;color:#666;">총 <strong>18</strong>건의 메뉴 권한</div></div>
      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th>번호</th><th>메뉴명</th><th>URL</th><th>시스템관리자</th><th>운영자</th><th>조회자</th><th>관리</th></tr></thead>
          <tbody id="authMenuBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
const menus = [
  {no:18,nm:'시스템관리 > 메뉴관리',url:'/admin/menucreate/menucreateManage.do',admin:true,oper:false,view:false},
  {no:17,nm:'시스템관리 > 코드관리',url:'/admin/code/codeList.do',admin:true,oper:true,view:false},
  {no:16,nm:'시스템관리 > 분류코드',url:'/admin/clcode/clcodeList.do',admin:true,oper:true,view:false},
  {no:15,nm:'배치관리 > 배치이력',url:'/admin/expthread/expthreadList.do',admin:true,oper:false,view:false},
  {no:14,nm:'통계 > 사이트로그',url:'/admin/sitelog/sitelogDateGraph.do',admin:true,oper:true,view:true},
  {no:13,nm:'캠페인관리 > 캠페인목록',url:'/admin/camp/campList.do',admin:true,oper:true,view:true},
  {no:12,nm:'회원관리 > 기업회원',url:'/admin/account/accountList.do',admin:true,oper:true,view:true},
  {no:11,nm:'회원관리 > 공무원회원',url:'/admin/emplyrinfo/emplyrInfoList.do',admin:true,oper:true,view:false},
];
const CHK = (v) => v ? '<i class="fa fa-check" style="color:#388e3c;font-size:15px;"></i>' : '<i class="fa fa-times" style="color:#ccc;font-size:15px;"></i>';
document.getElementById('authMenuBody').innerHTML = menus.map(d=>`
  <tr><td>${d.no}</td><td class="t-a-left">${d.nm}</td><td class="t-a-left" style="font-size:12px;color:#888;">${d.url}</td>
  <td>${CHK(d.admin)}</td><td>${CHK(d.oper)}</td><td>${CHK(d.view)}</td>
  <td><button class="btn btn-secondary btn-sm" onclick="alert('권한 수정 다이얼로그 오픈')"><i class="fa fa-pencil mr-1"></i>수정</button></td></tr>`).join('');
</script>
</body></html>
