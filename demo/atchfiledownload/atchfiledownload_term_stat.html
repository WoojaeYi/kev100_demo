<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>첨부파일 다운로드 통계 (기간별) | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>
.content-area { padding: 24px 28px; }
.chart-wrap { background:#fff; border:1px solid #e3eaf0; border-radius:8px; padding:24px; margin-bottom:24px; }
.chart-title { font-size:15px; font-weight:700; color:#0e424f; margin-bottom:16px; }
.stat-card { background:#fff; border:1px solid #e3eaf0; border-radius:8px; padding:20px 24px; }
.stat-card .label { font-size:12px; color:#888; }
.stat-card .value { font-size:26px; font-weight:700; color:#0e424f; }
.stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:24px; }
</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix">
      <div class="profile_pic"><div class="profile_avatar">관</div></div>
      <div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div>
    </div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right">
      <li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li>
    </ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12">
        <span><i class="fa fa-bar-chart mr-2" style="color:#1f8dab;font-size:17px;"></i>첨부파일 다운로드 통계 (기간별)</span>
      </div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block">
        <ul class="locationList">
          <li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li>
          <li>통계</li><li><i class="fa fa-angle-right"></i></li>
          <li style="color:#0e424f;font-weight:600;">첨부파일 다운로드 기간별 통계</li>
        </ul>
      </div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group mb-2">
          <label>사이트 &nbsp;</label>
          <select class="form-control" style="width:200px;"><option>K-EV100 서비스 포털</option><option>K-EV100 관리자 포털</option></select>
        </div>
        <div class="input-group">
          <label>조회 기간 &nbsp;</label>
          <input type="date" class="form-control" style="width:140px;" value="2026-01-01">
          <span style="line-height:36px;padding:0 6px;">~</span>
          <input type="date" class="form-control" style="width:140px;" value="2026-03-31">
          <button class="btn btn-dark"><i class="fa fa-search mr-1"></i>검색</button>
          <button class="btn btn-secondary ml-1"><i class="fa fa-download mr-1"></i>엑셀다운로드</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><span class="label"><i class="fa fa-download"></i> 조회기간 총 다운로드</span><span class="value">3,412</span></div>
        <div class="stat-card"><span class="label"><i class="fa fa-calendar-o"></i> 일 평균 다운로드</span><span class="value">37.9</span></div>
      </div>

      <div class="chart-wrap">
        <div class="chart-title"><i class="fa fa-bar-chart mr-1"></i>기간별 다운로드 수 (일별)</div>
        <canvas id="termChart" height="80"></canvas>
      </div>

      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th>날짜</th><th>다운로드 수</th><th>누적</th><th>전일 대비</th></tr></thead>
          <tbody id="termBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
const days30 = Array.from({length:30},(_,i)=>`2026-03-${String(i+1).padStart(2,'0')}`);
const dlData = [28,35,42,31,25,19,22,38,45,52,41,36,28,21,18,33,47,55,48,39,30,24,19,29,41,53,44,37,28,31];
new Chart(document.getElementById('termChart').getContext('2d'),{
  type:'line', data:{ labels:days30, datasets:[{ label:'다운로드', data:dlData, backgroundColor:'rgba(31,141,171,0.2)', borderColor:'#1f8dab', borderWidth:2, fill:true, pointRadius:3 }] },
  options:{ responsive:true, scales:{yAxes:[{ticks:{beginAtZero:true}}]}, legend:{display:false} }
});
let cumul=0;
document.getElementById('termBody').innerHTML = [...days30].reverse().map((d,i)=>{
  const idx=29-i; cumul+=dlData[idx];
  const diff=idx===0?'-':(dlData[idx]-dlData[idx-1]>=0?`<span style="color:#388e3c;">▲ ${dlData[idx]-dlData[idx-1]}</span>`:`<span style="color:#e53935;">▼ ${Math.abs(dlData[idx]-dlData[idx-1])}</span>`);
  return `<tr><td>${d}</td><td>${dlData[idx]}</td><td>${cumul}</td><td>${diff}</td></tr>`;
}).join('');
</script>
</body></html>
