<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>첨부파일 다운로드 통계 (연도별) | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>
.content-area { padding: 24px 28px; }
.chart-wrap { background:#fff; border:1px solid #e3eaf0; border-radius:8px; padding:24px; margin-bottom:24px; }
.chart-title { font-size:15px; font-weight:700; color:#0e424f; margin-bottom:16px; }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border:1px solid #e3eaf0; border-radius:8px; padding:20px 24px; }
.stat-card .label { font-size:12px; color:#888; }
.stat-card .value { font-size:26px; font-weight:700; color:#0e424f; }
</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix">
      <div class="profile_pic"><div class="profile_avatar">관</div></div>
      <div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div>
    </div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right">
      <li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li>
    </ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12">
        <span><i class="fa fa-bar-chart mr-2" style="color:#1f8dab;font-size:17px;"></i>첨부파일 다운로드 통계 (연도별)</span>
      </div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block">
        <ul class="locationList">
          <li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li>
          <li>통계</li><li><i class="fa fa-angle-right"></i></li>
          <li style="color:#0e424f;font-weight:600;">첨부파일 다운로드 연도별 통계</li>
        </ul>
      </div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group">
          <label>사이트 &nbsp;</label>
          <select class="form-control" style="width:200px;"><option>K-EV100 서비스 포털</option><option>K-EV100 관리자 포털</option></select>
          <button class="btn btn-dark ml-1"><i class="fa fa-search mr-1"></i>검색</button>
          <button class="btn btn-secondary ml-1"><i class="fa fa-download mr-1"></i>엑셀다운로드</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><span class="label"><i class="fa fa-download"></i> 전체 누적 다운로드</span><span class="value">38,241</span></div>
        <div class="stat-card"><span class="label"><i class="fa fa-arrow-up" style="color:#388e3c;"></i> 최고 성장률</span><span class="value">+34.2%</span></div>
        <div class="stat-card"><span class="label"><i class="fa fa-calendar"></i> 연평균 다운로드</span><span class="value">9,560</span></div>
      </div>

      <div class="chart-wrap">
        <div class="chart-title"><i class="fa fa-bar-chart mr-1"></i>연도별 다운로드 수</div>
        <canvas id="yearlyChart" height="60"></canvas>
      </div>

      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th>연도</th><th>공지사항</th><th>FAQ</th><th>Q&A</th><th>캠페인 서류</th><th>합계</th><th>전년 대비</th><th>성장률</th></tr></thead>
          <tbody id="yearlyBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
const years = ['2023','2024','2025','2026'];
const totals = [7123, 9548, 12784, 8786];
new Chart(document.getElementById('yearlyChart').getContext('2d'),{
  type:'bar', data:{ labels:years, datasets:[{ label:'다운로드 수', data:totals, backgroundColor:['rgba(31,141,171,0.7)','rgba(31,141,171,0.7)','rgba(31,141,171,0.7)','rgba(200,230,240,0.9)'], borderColor:['#1f8dab','#1f8dab','#1f8dab','#aaaaaa'], borderWidth:1 }] },
  options:{ responsive:true, scales:{yAxes:[{ticks:{beginAtZero:true}}]}, legend:{display:false} }
});
document.getElementById('yearlyBody').innerHTML = [...years].reverse().map((y,i)=>{
  const idx=3-i; const t=totals[idx];
  const diff=idx===0?'-':(t-totals[idx-1]>=0?`<span style="color:#388e3c;">▲ ${(t-totals[idx-1]).toLocaleString()}</span>`:`<span style="color:#e53935;">▼ ${Math.abs(t-totals[idx-1]).toLocaleString()}</span>`);
  const rate=idx===0?'-':`${((t-totals[idx-1])/totals[idx-1]*100).toFixed(1)}%`;
  const a=Math.round(t*0.28), b=Math.round(t*0.12), c=Math.round(t*0.18), d=t-a-b-c;
  return `<tr><td>${y}${idx===3?'<span class="ing" style="font-size:11px;margin-left:6px;">진행중</span>':''}</td><td>${a.toLocaleString()}</td><td>${b.toLocaleString()}</td><td>${c.toLocaleString()}</td><td>${d.toLocaleString()}</td><td><strong>${t.toLocaleString()}</strong></td><td>${diff}</td><td>${rate}</td></tr>`;
}).join('');
</script>
</body></html>
