<!DOCTYPE html>

  </div></div>

        <div class="input-group">

            <option value="mberNm">담당자명</option>
            <option value="rejectReason">반려사유</option>
            <option value="sendMailYn">이메일발송여부</option>
          </select>
          <input type="text" id="searchValue" class="form-control" style="width:220px;" placeholder="검색어 입력">
          <button class="btn btn-dark ml-1"><i class="fa fa-search mr-1"></i>검색</button>
          <button class="btn btn-secondary ml-1"><i class="fa fa-refresh mr-1"></i>초기화</button>
          <div style="margin-left:auto;">
            <select id="maxPageItems" class="form-control" style="width:90px;">
              <option value="10">10건씩</option>
              <option value="20">20건씩</option>
              <option value="30">30건씩</option>
              <option value="40">40건씩</option>

          </colgroup>
          <thead><tr>
            <th>번호</th>
            <th>아이디</th>
            <th>담당자명</th>
            <th>기업명</th>
            <th>이메일발송여부</th>
            <th>반려일시</th>
            <th>관리</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>

</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 2;

  {no:47, mberId:'clean_nrg',    mberNm:'강민서', entNm:'클린에너지(주)',     sendMailYn:'Y', frstRegistPnttm:'2026-03-28 14:22:35'},
