<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>첨부파일 등록 | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>
.content-area { padding: 24px 28px; }
.file-drop-area { border:2px dashed #b0c4ce; border-radius:8px; padding:32px; text-align:center; background:#f8fbfc; cursor:pointer; transition:border-color .2s; }
.file-drop-area:hover { border-color:#1f8dab; }
.file-drop-area i { font-size:40px; color:#b0c4ce; display:block; margin-bottom:8px; }
.file-drop-area p { color:#888; font-size:14px; margin:0; }
#fileList { margin-top:12px; }
.file-item { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#eef5f8; border-radius:4px; margin-bottom:6px; font-size:13px; }
.file-item .remove { cursor:pointer; color:#e53935; margin-left:auto; }
</style>
</head>
<body>
<div class="container body"><div class="main_container">

  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix">
      <div class="profile_pic"><div class="profile_avatar">관</div></div>
      <div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div>
    </div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>

  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right">
      <li class="nav-item dropdown" style="padding-left:10px;position:relative;">
        <a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a>
      </li>
    </ul></nav>
  </div></div>

  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12">
        <span><i class="fa fa-upload mr-2" style="color:#1f8dab;font-size:17px;"></i>첨부파일 등록</span>
      </div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block">
        <ul class="locationList">
          <li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li>
          <li>파일관리</li><li><i class="fa fa-angle-right"></i></li>
          <li><a href="atchfile_list.html">첨부파일</a></li><li><i class="fa fa-angle-right"></i></li>
          <li style="color:#0e424f;font-weight:600;">등록</li>
        </ul>
      </div>
    </div>

    <div class="content-area">
      <table class="detail-table">
        <tbody>
          <tr>
            <th style="width:160px;">파일 선택 <span style="color:#e53935;">*</span></th>
            <td colspan="3">
              <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
                <i class="fa fa-cloud-upload"></i>
                <p>클릭하거나 파일을 여기에 드래그하세요.</p>
                <p style="margin-top:6px;font-size:12px;color:#aaa;">여러 파일 동시 업로드 가능 | 최대 50MB / 파일</p>
              </div>
              <input type="file" id="fileInput" multiple style="display:none;" onchange="showFiles(this.files)">
              <div id="fileList"></div>
            </td>
          </tr>
          <tr>
            <th>설명</th>
            <td colspan="3">
              <textarea class="form-control" rows="4" placeholder="파일에 대한 설명을 입력하세요."></textarea>
            </td>
          </tr>
        </tbody>
      </table>

      <div style="margin-top:24px;display:flex;gap:8px;justify-content:center;">
        <a href="atchfile_list.html" class="btn btn-secondary"><i class="fa fa-times mr-1"></i>취소</a>
        <button class="btn btn-primary"><i class="fa fa-save mr-1"></i>저장</button>
      </div>
    </div>
  </div>

  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
function showFiles(files) {
  const list = document.getElementById('fileList');
  list.innerHTML = Array.from(files).map((f, i) => `
    <div class="file-item">
      <i class="fa fa-file-o"></i>
      <span>${f.name}</span>
      <span style="color:#aaa;font-size:12px;">(${(f.size/1024).toFixed(1)} KB)</span>
      <span class="remove" onclick="this.parentElement.remove()"><i class="fa fa-times"></i></span>
    </div>`).join('');
}
</script>
</body></html>
