<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">

</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-car mr-2" style="color:#1f8dab;font-size:17px;"></i>기업별 보유현황</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>캠페인 관리</li><li><i class="fa fa-angle-right"></i></li><li><a href="campstat_enterprise_list.html">기업 현황</a></li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">보유현황</li></ul></div>
    </div>
    <div class="content-area">
      <table class="detail-table" style="margin-bottom:20px;">
        <tr><th style="width:160px;">기업명</th><td>㈜에코모터스</td><th style="width:160px;">현황 기준 일시</th><td>2026-03-31 09:00</td></tr>
      </table>
      <div class="row">
        <div class="col-md-6"><div class="chart-panel"><div class="chart-title">유종별 현황</div><div id="canvas_inCarStatByEnergy" style="height:220px;"></div></div></div>
        <div class="col-md-6"><div class="chart-panel"><div class="chart-title">매입/임차별 현황</div><div id="canvas_inCarStatByInType" style="height:220px;"></div></div></div>
      </div>
      <div class="row">
        <div class="col-md-6"><div class="chart-panel"><div class="chart-title">차종별 현황</div><div id="canvas_inCarStatByCarType" style="height:220px;"></div></div></div>
        <div class="col-md-6"><div class="chart-panel"><div class="chart-title">충전기 현황</div><div id="canvas_inChargerStat" style="height:220px;"></div></div></div>
      </div>
      <hr style="margin:8px 0;">
      <div class="row">
        <div class="col-md-4"><div class="chart-panel"><div class="chart-title">내연기관차 차종별 현황</div><div id="canvas_inInterCarStatByCarType" style="height:220px;"></div></div></div>
        <div class="col-md-4"><div class="chart-panel"><div class="chart-title">전기자동차 차종별 현황</div><div id="canvas_inElectCarStatByCarType" style="height:220px;"></div></div></div>
        <div class="col-md-4"><div class="chart-panel"><div class="chart-title">수소전기차 차종별 현황</div><div id="canvas_inHydrgCarStatByCarType" style="height:220px;"></div></div></div>
      </div>
      <div style="display:flex;justify-content:center;margin-top:8px;">
        <a href="campstat_enterprise_list.html" class="btn btn-secondary"><i class="fa fa-list mr-1"></i>목록</a>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 2;
var COLORS = ['#26B99A','#3f5872','#BDC3C7','#3498DB','#9B59B6','#8abb6f','#759c6a','#bfd3b7'];
function drawPieChart(canvasId, dataset) {
  var el = document.getElementById(canvasId);
  if (!el) return;
  var chart = echarts.init(el);
  var isEmpty = !dataset.sumValue || dataset.sumValue === 0;
  chart.setOption({
    tooltip: { trigger:'item', formatter:function(p){ if(p.name==='데이터 없음') return '데이터 없음'; return p.name+' : '+p.value+' 대 ('+p.percent.toFixed(1)+'%)'; } },
    legend: { orient:'horizontal', bottom:0, left:'center', textStyle:{fontSize:11}, data:dataset.datas.map(function(d){return d.name;}) },
    color: COLORS,
    series: [
      { type:'pie', radius:['38%','62%'], center:['50%','44%'], avoidLabelOverlap:true,
        label:{ show:!isEmpty, fontSize:11, formatter:function(p){return p.value+'대\n('+p.percent.toFixed(0)+'%)';} },
        labelLine:{show:!isEmpty,length:8,length2:6},
        itemStyle:{borderRadius:4,borderColor:'#fff',borderWidth:1},
        data: isEmpty ? [{value:1,name:'데이터 없음',itemStyle:{color:'#eeeeee'},label:{show:false},labelLine:{show:false},tooltip:{show:false}}] : dataset.datas,
        emphasis:{label:{show:true,fontSize:12,fontWeight:'bold'}}
      },
      { name:'전체', type:'pie', radius:['0','28%'], center:['50%','44%'], silent:true,
        label:{show:true,position:'center',formatter:function(){return '총\n'+dataset.sumValue+' 대';},fontSize:12,fontWeight:'bold',color:'#333',lineHeight:18},
        labelLine:{show:false},
        data:[{value:isEmpty?1:dataset.sumValue,name:'전체'}],
        itemStyle:{color:'none',borderWidth:0}, tooltip:{show:false}
      }
    ]
  });
  return chart;
}
var sampleData = {
  inCarStatByEnergy:       { datas:[{name:'내연기관',value:201},{name:'전기차',value:127},{name:'수소차',value:31}], sumValue:359 },
  inCarStatByInType:       { datas:[{name:'매입',value:274},{name:'임차',value:86}], sumValue:360 },
  inCarStatByCarType:      { datas:[{name:'승용',value:201},{name:'승합',value:89},{name:'화물',value:52}], sumValue:342 },
  inChargerStat:           { datas:[{name:'완속충전기',value:47},{name:'급속충전기',value:18},{name:'수소충전소',value:3}], sumValue:68 },
  inInterCarStatByCarType: { datas:[{name:'승용',value:112},{name:'승합',value:54},{name:'화물',value:35}], sumValue:201 },
  inElectCarStatByCarType: { datas:[{name:'전기승용',value:98},{name:'전기승합',value:17},{name:'전기화물',value:12}], sumValue:127 },
  inHydrgCarStatByCarType: { datas:[{name:'수소승용',value:24},{name:'수소버스',value:7}], sumValue:31 }
};
$(function() {
  var charts = Object.keys(sampleData).map(function(id){ return drawPieChart('canvas_'+id, sampleData[id]); });
  window.addEventListener('resize', function(){ charts.forEach(function(c){if(c)c.resize();}); });
});
</script>
</body></html>
