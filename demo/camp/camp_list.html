const camps = [

function render() {
  const tbody = document.getElementById('campBody');

      <td>${c.no}</td>
      <td>${c.typ}</td>
      <td>${c.joinYear}</td>

      <td>${c.mgr}</td>
      <td>${c.aplTyp}</td>
      <td>${STAT[c.aplStat]||c.aplStat}</td>
