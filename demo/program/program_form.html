<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로그램 등록/수정 | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>.content-area{padding:24px 28px;}.btn-area{display:flex;justify-content:center;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid #e5ecf1;}</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-code mr-2" style="color:#1f8dab;font-size:17px;"></i>프로그램 등록</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>시스템관리</li><li><i class="fa fa-angle-right"></i></li><li><a href="program_list.html">프로그램 목록</a></li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">등록</li></ul></div>
    </div>
    <div class="content-area">
      <div class="x_panel">
        <div class="x_title"><h2>프로그램 등록</h2></div>
        <div class="x_content">
          <form>
            <table class="detail-table">
              <tr><th style="width:160px;">프로그램명 <span class="text-danger">*</span></th><td><input type="text" class="form-control" placeholder="프로그램명 입력"></td></tr>
              <tr><th>URL <span class="text-danger">*</span></th><td><input type="text" class="form-control" placeholder="/admin/.../*.do"></td></tr>
              <tr><th>URL 방식 <span class="text-danger">*</span></th><td>
                <select class="form-control" style="width:120px;"><option>GET</option><option>POST</option><option>DELETE</option><option>PUT</option></select>
              </td></tr>
              <tr><th>설명</th><td><textarea class="form-control" rows="2" placeholder="프로그램 설명 입력"></textarea></td></tr>
              <tr><th>사용여부 <span class="text-danger">*</span></th><td>
                <select class="form-control" style="width:120px;"><option>사용</option><option>미사용</option></select>
              </td></tr>
              <tr><th>접근 권한</th><td>
                <div style="display:flex;gap:12px;">
                  <label style="font-size:13px;"><input type="checkbox" checked> 시스템관리자</label>
                  <label style="font-size:13px;"><input type="checkbox"> 운영자</label>
                  <label style="font-size:13px;"><input type="checkbox"> 조회자</label>
                </div>
              </td></tr>
            </table>
            <div class="btn-area">
              <a href="program_list.html" class="btn btn-secondary"><i class="fa fa-list mr-1"></i>목록</a>
              <button type="submit" class="btn btn-primary"><i class="fa fa-save mr-1"></i>저장</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>window.currentGnb = 4;</script>
</body></html>
