<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
const data = [
  {no:124,id:'PGM0124',nm:'배치 이력 목록',url:'/admin/expthread/expthreadList.do',method:'GET',use:'Y'},

];

const USE={'Y':'<span class="use">사용</span>','N':'<span class="notUse">미사용</span>'};
document.getElementById('pgmBody').innerHTML = data.map(d=>`
  <tr><td>${d.no}</td><td style="font-size:12px;color:#888;">${d.id}</td><td class="t-a-left"><a href="program_read.html">${d.nm}</a></td>
  <td class="t-a-left" style="font-size:12px;color:#888;">${d.url}</td>
  <td><span style="background:${METHOD_COLOR[d.method]||'#555'};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">${d.method}</span></td>
  <td>${USE[d.use]}</td>
  <td><a href="program_read.html" class="btn btn-secondary btn-sm"><i class="fa fa-eye mr-1"></i>조회</a></td></tr>`).join('');
</script>
