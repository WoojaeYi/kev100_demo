<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item dropdown" style="padding-left:10px;position:relative;"><a href="#" class="user-profile dropdown-toggle"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-list-alt mr-2" style="color:#1f8dab;font-size:17px;"></i>게시판 관리</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>시스템관리</li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">게시판관리</li></ul></div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group">
          <label>사용여부 &nbsp;</label><select class="form-control" style="width:100px;"><option>전체</option><option>사용</option><option>미사용</option></select>

          <input type="text" class="form-control" style="width:200px;" placeholder="게시판명 검색">

          <button class="btn btn-secondary"><i class="fa fa-refresh mr-1"></i>초기화</button>
        </div>
      </div>
      <div class="table-info"><div class="total">총 <strong>6</strong>건</div><button class="btn btn-primary btn-sm" onclick="location.href='ntt_form.html'"><i class="fa fa-plus mr-1"></i>등록</button></div>
      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th>번호</th><th>게시판ID</th><th>게시판명</th><th>게시판유형</th><th>댓글허용</th><th>파일허용</th><th>사용여부</th><th>상세</th></tr></thead>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 3;
const data=[
  {no:6,id:'NTT_NOTICE',nm:'공지사항',type:'공지형',reply:'미허용',file:'허용',use:'use',status:'사용'},
  {no:5,id:'NTT_DATA',nm:'자료실',type:'자료형',reply:'미허용',file:'허용',use:'use',status:'사용'},
  {no:4,id:'NTT_NEWS',nm:'뉴스',type:'일반형',reply:'미허용',file:'미허용',use:'use',status:'사용'},
  {no:3,id:'NTT_FAQ',nm:'FAQ',type:'FAQ형',reply:'미허용',file:'허용',use:'use',status:'사용'},
  {no:2,id:'NTT_QA',nm:'Q&A',type:'문의형',reply:'허용',file:'허용',use:'use',status:'사용'},

];
document.getElementById('tbody').innerHTML=data.map(d=>`
  <tr><td>${d.no}</td><td style="font-family:monospace;font-size:12px;">${d.id}</td><td>${d.nm}</td><td>${d.type}</td><td>${d.reply}</td><td>${d.file}</td><td><span class="${d.use}">${d.status}</span></td><td><a href="ntt_read.html" class="btn btn-secondary btn-sm"><i class="fa fa-eye mr-1"></i>조회</a></td></tr>`).join('');
</script>
</body></html>
