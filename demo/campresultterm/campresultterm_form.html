<style>
.content-area{padding:24px 28px;}
.section-header{font-size:14px;font-weight:700;color:#0e424f;border-left:3px solid #0e424f;padding-left:10px;margin:24px 0 12px;}
.section-header:first-child{margin-top:0;}
.btn-area{display:flex;justify-content:center;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid #e5ecf1;}

/* 날짜 입력 래퍼 */
.dt-wrap{display:inline-flex;align-items:center;gap:0;position:relative;}
.dt-wrap .form-control{border-radius:2px 0 0 2px;border-right:none;}
.dt-btn{height:32px;padding:0 10px;background:#f0f5f7;border:1px solid #d9d9d9;border-left:none;border-radius:0 2px 2px 0;cursor:pointer;color:#0e424f;font-size:14px;display:inline-flex;align-items:center;transition:background .15s;}
.dt-btn:hover{background:#d8eaf0;color:#07323c;}

/* 팝업 */
.dt-popup{display:none;position:absolute;top:36px;left:0;z-index:999;background:#fff;border:1px solid #d9d9d9;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.12);width:260px;font-family:'Noto Sans KR',sans-serif;font-size:13px;}
.dt-popup.open{display:block;}

/* 팝업 헤더 */
.dp-head{display:flex;align-items:center;justify-content:space-between;background:#0e424f;color:#fff;padding:8px 12px;border-radius:3px 3px 0 0;}
.dp-head button{background:none;border:none;color:#fff;font-size:16px;cursor:pointer;padding:0 4px;line-height:1;}
.dp-head button:hover{color:#7ecbda;}
.dp-title{font-size:13px;font-weight:600;}

/* 요일 헤더 */
.dp-dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:6px 8px 2px;}
.dp-dow span{font-size:11px;color:#888;font-weight:600;}
.dp-dow span:first-child{color:#c62828;}
.dp-dow span:last-child{color:#1565c0;}

/* 날짜 그리드 */
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 8px 8px;gap:2px;}
.dp-day{text-align:center;padding:5px 0;border-radius:2px;cursor:pointer;font-size:12px;color:#333;}
.dp-day:hover{background:#e8f4f8;color:#0e424f;}
.dp-day.today{font-weight:700;color:#1f8dab;}
.dp-day.selected{background:#0e424f;color:#fff !important;}
.dp-day.other-month{color:#ccc;}
.dp-day.sun{color:#c62828;}
.dp-day.sat{color:#1565c0;}
.dp-day.selected.sun,.dp-day.selected.sat{color:#fff !important;}

/* 시간 영역 */
.dp-time{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 12px;border-top:1px solid #eee;background:#fafafa;}
.dp-time input{width:44px;height:28px;text-align:center;border:1px solid #d9d9d9;border-radius:2px;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
.dp-time span{color:#888;font-size:13px;}

/* 확인 버튼 */
.dp-footer{padding:8px 12px;text-align:right;border-top:1px solid #eee;}
.dp-confirm{height:28px;padding:0 16px;background:#0e424f;color:#fff;border:none;border-radius:2px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.dp-confirm:hover{background:#07323c;}
</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item dropdown" style="padding-left:10px;position:relative;"><a href="#" class="user-profile dropdown-toggle"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-clock-o mr-2" style="color:#1f8dab;font-size:17px;"></i>캠페인 결과기간 등록</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>캠페인관리</li><li><i class="fa fa-angle-right"></i></li><li><a href="campresultterm_list.html">결과기간</a></li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">등록</li></ul></div>
    </div>
    <div class="content-area">
      <div class="section-header">기본 정보</div>
      <table class="detail-table">
        <tr>
          <th style="width:180px;">연도 <span style="color:#c62828;">*</span></th>
          <td colspan="3">
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="text" class="form-control" value="2026" maxlength="4" style="width:120px;" placeholder="YYYY">
              <span style="color:#888;font-size:12px;">※ 등록 후 변경 불가</span>

              <button type="button" class="dt-btn" onclick="openDatePicker('endDt')"><i class="fa fa-calendar"></i></button>
              <div class="dt-popup" id="dp_endDt"></div>
            </div>

        </tr>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>window.currentGnb = 2;</script>
<script>
(function() {
  var state = {}; // { targetId, year, month, selectedDate }

  function pad(n) { return String(n).padStart(2, '0'); }

  function parseInput(id) {
    var val = document.getElementById(id).value;
    var m = val.match(/^(\d{4})-(\d{2})-(\d{2})\s(\d{2}):(\d{2}):(\d{2})$/);
    if (m) return { y: +m[1], mo: +m[2], d: +m[3], h: +m[4], mi: +m[5], s: +m[6] };
    var now = new Date();
    return { y: now.getFullYear(), mo: now.getMonth()+1, d: now.getDate(), h: 0, mi: 0, s: 0 };
  }

  function renderCalendar(targetId) {
    var s = state[targetId];
    var popup = document.getElementById('dp_' + targetId);
    var firstDay = new Date(s.year, s.month - 1, 1).getDay();
    var daysInMonth = new Date(s.year, s.month, 0).getDate();
    var today = new Date();
    var DOW = ['일','월','화','수','목','금','토'];

    var dowHtml = DOW.map(function(d, i) {
      return '<span>' + d + '</span>';
    }).join('');

    var cells = '';
    var prevDays = new Date(s.year, s.month - 1, 0).getDate();
    for (var i = 0; i < firstDay; i++) {
      cells += '<span class="dp-day other-month">' + (prevDays - firstDay + 1 + i) + '</span>';
    }
    for (var d = 1; d <= daysInMonth; d++) {
      var dow = (firstDay + d - 1) % 7;
      var cls = 'dp-day';
      if (dow === 0) cls += ' sun';
      if (dow === 6) cls += ' sat';
      if (s.year === today.getFullYear() && s.month === today.getMonth()+1 && d === today.getDate()) cls += ' today';
      if (s.selectedDate && s.year === s.selectedDate.y && s.month === s.selectedDate.mo && d === s.selectedDate.d) cls += ' selected';
      cells += '<span class="' + cls + '" onclick="selectDay(\'' + targetId + '\',' + d + ')">' + d + '</span>';
    }
    var remain = 42 - firstDay - daysInMonth;
    for (var j = 1; j <= remain; j++) {
      cells += '<span class="dp-day other-month">' + j + '</span>';
    }

    popup.innerHTML =
      '<div class="dp-head">' +
        '<button onclick="changeMonth(\'' + targetId + '\',-1)">&#8249;</button>' +
        '<span class="dp-title">' + s.year + '년 ' + pad(s.month) + '월</span>' +
        '<button onclick="changeMonth(\'' + targetId + '\',1)">&#8250;</button>' +
      '</div>' +
      '<div class="dp-dow">' + dowHtml + '</div>' +
      '<div class="dp-grid">' + cells + '</div>' +
      '<div class="dp-time">' +
        '<input type="number" id="dp_h_' + targetId + '" min="0" max="23" value="' + pad(s.h) + '">' +
        '<span>:</span>' +
        '<input type="number" id="dp_mi_' + targetId + '" min="0" max="59" value="' + pad(s.mi) + '">' +
        '<span>:</span>' +
        '<input type="number" id="dp_s_' + targetId + '" min="0" max="59" value="' + pad(s.s) + '">' +
      '</div>' +
      '<div class="dp-footer">' +
        '<button class="dp-confirm" onclick="confirmDate(\'' + targetId + '\')">확인</button>' +
      '</div>';
  }

  window.openDatePicker = function(targetId) {
    // 다른 팝업 닫기
    document.querySelectorAll('.dt-popup.open').forEach(function(el) {
      if (el.id !== 'dp_' + targetId) el.classList.remove('open');
    });
    var popup = document.getElementById('dp_' + targetId);
    if (popup.classList.contains('open')) {
      popup.classList.remove('open');
      return;
    }
    var parsed = parseInput(targetId);
    state[targetId] = { year: parsed.y, month: parsed.mo, h: parsed.h, mi: parsed.mi, s: parsed.s,
      selectedDate: { y: parsed.y, mo: parsed.mo, d: parsed.d } };
    renderCalendar(targetId);
    popup.classList.add('open');
  };

  window.changeMonth = function(targetId, delta) {
    var s = state[targetId];
    s.month += delta;
    if (s.month > 12) { s.month = 1; s.year++; }
    if (s.month < 1)  { s.month = 12; s.year--; }
    renderCalendar(targetId);
  };

  window.selectDay = function(targetId, d) {
    var s = state[targetId];
    s.selectedDate = { y: s.year, mo: s.month, d: d };
    renderCalendar(targetId);
  };

  window.confirmDate = function(targetId) {
    var s = state[targetId];
    if (!s.selectedDate) return;
    var h  = parseInt(document.getElementById('dp_h_'  + targetId).value) || 0;
    var mi = parseInt(document.getElementById('dp_mi_' + targetId).value) || 0;
    var sec = parseInt(document.getElementById('dp_s_'  + targetId).value) || 0;
    var sd = s.selectedDate;
    var val = sd.y + '-' + pad(sd.mo) + '-' + pad(sd.d) + ' ' + pad(h) + ':' + pad(mi) + ':' + pad(sec);
    document.getElementById(targetId).value = val;
    document.getElementById('dp_' + targetId).classList.remove('open');
  };

  // 팝업 외부 클릭 시 닫기
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dt-wrap')) {
      document.querySelectorAll('.dt-popup.open').forEach(function(el) {
        el.classList.remove('open');
      });
    }
  });
})();
</script>
</body></html>
