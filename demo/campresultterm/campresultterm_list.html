<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠페인 결과기간 목록 | K-EV100 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="../assets/style.css" rel="stylesheet">
<style>.content-area{padding:24px 28px;}.table-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}.table-info .total{font-size:13px;color:#666;}.table-info .total strong{color:#0e424f;font-weight:700;}</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item dropdown" style="padding-left:10px;position:relative;"><a href="#" class="user-profile dropdown-toggle"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-clock-o mr-2" style="color:#1f8dab;font-size:17px;"></i>캠페인 결과기간 목록</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>캠페인관리</li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">결과기간</li></ul></div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group">
          <label>연도</label>
          <select class="form-control" style="width:110px;"><option>전체</option><option>2026</option><option>2025</option><option>2024</option></select>
          <button class="btn btn-dark"><i class="fa fa-search mr-1"></i>검색</button>
          <button class="btn btn-secondary"><i class="fa fa-refresh mr-1"></i>초기화</button>
        </div>
      </div>
      <div class="table-info"><div class="total">총 <strong>5</strong>건</div><button class="btn btn-primary btn-sm" onclick="location.href='campresultterm_form.html'"><i class="fa fa-plus mr-1"></i>등록</button></div>
      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th>번호</th><th>연도</th><th>제출 시작일시</th><th>제출 종료일시</th><th>제출허용여부</th><th>최종수정일</th><th>관리</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 2;
const data=[
  {no:5,year:'2026',s:'2026-01-01 00:00:00',e:'2026-06-30 23:59:59',allow:'Y',updt:'2026-03-15 10:22:00'},
  {no:4,year:'2025',s:'2025-07-01 00:00:00',e:'2025-12-31 23:59:59',allow:'Y',updt:'2025-06-20 09:10:00'},
  {no:3,year:'2025',s:'2025-01-01 00:00:00',e:'2025-06-30 23:59:59',allow:'N',updt:'2024-12-18 14:05:00'},
  {no:2,year:'2024',s:'2024-07-01 00:00:00',e:'2024-12-31 23:59:59',allow:'Y',updt:'2024-06-25 11:30:00'},
  {no:1,year:'2024',s:'2024-01-01 00:00:00',e:'2024-06-30 23:59:59',allow:'Y',updt:'2023-12-10 08:45:00'},
];
document.getElementById('tbody').innerHTML=data.map(d=>`
  <tr>
    <td>${d.no}</td>
    <td>${d.year}</td>
    <td>${d.s}</td>
    <td>${d.e}</td>
    <td><span class="${d.allow==='Y'?'use':'notUse'}">${d.allow==='Y'?'허용':'허용안함'}</span></td>
    <td>${d.updt}</td>
    <td>
      <a href="campresultterm_form.html" class="btn btn-secondary btn-sm"><i class="fa fa-gear mr-1"></i>수정</a>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('삭제하시겠습니까?'))alert('삭제되었습니다.');"><i class="fa fa-trash mr-1"></i>삭제</button>
    </td>
  </tr>`).join('');
</script>
</body></html>
