<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드상세 목록 | K-EV100 관리자</title>

<link href="../assets/style.css" rel="stylesheet">
<style>.content-area{padding:24px 28px;}.table-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}</style>
</head>
<body>
<div class="container body"><div class="main_container">
  <div class="left_col menu_fixed"><div class="left_col scroll-view">
    <div class="navbar nav_title"><a href="../index.html" class="site_title"><i class="fa fa-bolt"></i><span>K-EV100 관리자</span></a></div>
    <div class="clearfix"></div>
    <div class="profile clearfix"><div class="profile_pic"><div class="profile_avatar">관</div></div><div class="profile_info"><span>Welcome,</span><h2>관리자</h2></div></div>
    <div class="main_menu_side hidden-print main_menu"><div id="leftMenuSection" class="menu_section"></div></div>
    
  </div></div>
  <div class="top_nav"><div class="nav_menu">
    <div class="nav toggle"><a id="menu_toggle"><i class="fa fa-bars"></i></a></div>
    <div id="kecoGnb" class="keco-gnb"><ul class="keco-gnb-list" id="gnbList"></ul></div>
    <nav class="nav navbar-nav"><ul class="navbar-right"><li class="nav-item" style="padding-left:10px;"><a href="#" class="user-profile"><div class="nav-avatar">관</div>관리자</a></li></ul></nav>
  </div></div>
  <div class="right_col" role="main">
    <div class="page-title row">
      <div class="col-md-6 col-sm-12"><span><i class="fa fa-list-ul mr-2" style="color:#1f8dab;font-size:17px;"></i>코드상세 목록</span></div>
      <div class="col-md-6 col-sm-12 d-none d-sm-block"><ul class="locationList"><li><i class="fa fa-home"></i></li><li><i class="fa fa-angle-right"></i></li><li>시스템관리</li><li><i class="fa fa-angle-right"></i></li><li style="color:#0e424f;font-weight:600;">코드상세 목록</li></ul></div>
    </div>
    <div class="content-area">
      <div class="searchBox">
        <div class="input-group">
          <label>분류코드 &nbsp;</label>
          <select class="form-control" style="width:200px;"><option>∷ 분류코드 선택 ∷</option><option selected>ENT_CLS - 기업분류</option><option>CAMP_STATUS - 캠페인상태</option></select>
          <input type="text" class="form-control" style="width:180px;" placeholder="코드명 검색">
          <button class="btn btn-dark"><i class="fa fa-search mr-1"></i>검색</button>
        </div>
      </div>
      <div class="table-info">
        <div style="font-size:13px;color:#666;">분류코드: <strong>ENT_CLS (기업분류)</strong> — 총 <strong>3</strong>건</div>
        <a href="codedetail_form.html" class="btn btn-dark btn-sm"><i class="fa fa-pencil mr-1"></i>등록</a>
      </div>
      <div class="list_wrapper">
        <table class="listTable">
          <thead><tr><th>번호</th><th>코드</th><th>코드명</th><th>설명</th><th>정렬순서</th><th>사용여부</th><th>관리</th></tr></thead>
          <tbody id="codedetailBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer><div>K-EV100 서비스 포털 &copy; 2026</div></footer>
</div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/menu.js"></script><script src="../assets/main.js"></script>
<script>
window.currentGnb = 4;
const data = [
  {no:3,cd:'LARGE',nm:'대기업',dc:'연매출 1000억 이상 또는 임직원 500인 이상',sort:1,use:'Y'},
  {no:2,cd:'MID',nm:'중견기업',dc:'연매출 400억 이상 또는 임직원 200인 이상',sort:2,use:'Y'},
  {no:1,cd:'SMALL',nm:'중소기업',dc:'중소기업 기본법상 중소기업',sort:3,use:'Y'},
];
const USE={'Y':'<span class="use">사용</span>','N':'<span class="notUse">미사용</span>'};
document.getElementById('codedetailBody').innerHTML = data.map(d=>`
  <tr><td>${d.no}</td><td>${d.cd}</td><td>${d.nm}</td><td class="t-a-left">${d.dc}</td><td>${d.sort}</td><td>${USE[d.use]}</td>
  <td><a href="codedetail_form.html" class="btn btn-secondary btn-sm"><i class="fa fa-pencil mr-1"></i>수정</a>
  <button class="btn btn-danger btn-sm" onclick="if(confirm('삭제?'))alert('삭제완료')"><i class="fa fa-trash mr-1"></i>삭제</button></td></tr>`).join('');
</script>
</body></html>
